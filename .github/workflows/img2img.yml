name: Run Img2Img From Repo File

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check input file
        run: |
          pwd
          ls -la
          ls -la input
          file input/sample.png

      - name: Build JSON payload
        shell: bash
        run: |
          mkdir -p output

          python3 - <<'PY'
          import base64
          import json
          
          with open("input/download.jpeg", "rb") as f:
              image_b64 = base64.b64encode(f.read()).decode("utf-8")
          
          payload = {
              "prompt": "Turn this into a cyberpunk portrait",
              "imageBase64": image_b64,
              "negative_prompt": "blurry, low quality, distorted",
              "strength": 0.8,
              "guidance": 7.5,
              "num_steps": 20,
              "width": 768,
              "height": 768,
              "seed": 12345
          }
          
          with open("output/payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f)
          PY

      - name: Validate payload
        run: |
          ls -lh output/payload.json
          python3 -m json.tool output/payload.json > /dev/null
          echo "payload.json valid"

      - name: Debug worker url
        env:
          WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: |
          echo "WORKER_URL=$WORKER_URL"

      - name: Call Cloudflare Worker
        env:
          WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}
        run: |
          curl --fail --silent --show-error \
            -X POST "${WORKER_URL}/generate" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${WORKER_API_KEY}" \
            --data-binary @output/payload.json \
            -o output/result.png

      - name: Upload generated image
        uses: actions/upload-artifact@v4
        with:
          name: generated-image
          path: output/result.png

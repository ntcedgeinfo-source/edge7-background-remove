name: Remove Background From Repo Image

on:
  workflow_dispatch:

jobs:
  remove-bg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build raw GitHub image URL
        id: vars
        shell: bash
        run: |
          IMAGE_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/input/download.jpeg"
          echo "image_url=${IMAGE_URL}" >> "$GITHUB_OUTPUT"
          echo "Using image URL: ${IMAGE_URL}"

      - name: Call Cloudflare Worker
        env:
          WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: |
          mkdir -p output

          curl --fail --silent --show-error \
            "${WORKER_URL}/remove-background?imageUrl=${{ steps.vars.outputs.image_url }}" \
            --output output/sample-no-bg.png

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: removed-background
          path: output/sample-no-bg.png

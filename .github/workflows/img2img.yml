name: Run Img2Img From Repo File

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt"
        required: true
        type: string
        default: "Turn this into a cyberpunk portrait"
      input_file:
        description: "File inside repo input folder"
        required: true
        type: string
        default: "input/download.jpeg"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build JSON payload from repo image
        shell: bash
        run: |
          mkdir -p output
          FILE_PATH="${{ inputs.input_file }}"

          if [ ! -f "$FILE_PATH" ]; then
            echo "File not found: $FILE_PATH"
            exit 1
          fi

          python3 - <<'PY'
          import base64
          import json
          import os

          file_path = os.environ["FILE_PATH"]
          prompt = os.environ["PROMPT"]

          with open(file_path, "rb") as f:
              image_b64 = base64.b64encode(f.read()).decode("utf-8")

          payload = {
              "prompt": prompt,
              "imageBase64": image_b64,
              "negative_prompt": "blurry, low quality, distorted",
              "strength": 0.8,
              "guidance": 7.5,
              "num_steps": 20,
              "width": 768,
              "height": 768,
              "seed": 12345
          }

          with open("output/payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f)
          PY
        env:
          FILE_PATH: ${{ inputs.input_file }}
          PROMPT: ${{ inputs.prompt }}

      - name: Call Cloudflare Worker
        shell: bash
        env:
          WORKER_URL: ${{ secrets.CF_WORKER_URL }} 
        run: |
          curl -X POST "${WORKER_URL}/generate" \
            -H "Content-Type: application/json" \ 
            --data @output/payload.json \
            --output output/result.png

      - name: Upload generated image
        uses: actions/upload-artifact@v4
        with:
          name: generated-image
          path: output/result.png
